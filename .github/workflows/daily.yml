name: Daily AI Brief Generator

on:
  schedule:
    # 彻底错峰：设置为 UTC 时间 23:38 (对应北京时间早上 7:38)
    - cron: '38 23 * * *'
  workflow_dispatch: # 允许在 Actions 页面手动点击运行，方便调试

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许 GitHub Actions 机器人推送代码回仓库

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # 自动缓存 pip 依赖，加速后续运行

    # 缓存 SQLite 数据库，避免每天重复处理前几天的论文，节省 LLM API 成本
    - name: Cache SQLite DB
      uses: actions/cache@v4
      with:
        path: data/brief.db
        key: db-${{ github.run_id }}
        restore-keys: |
          db-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run pipeline
      env:
        # 从 GitHub Secrets 读取你的大模型配置
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        LLM_MODEL: ${{ secrets.LLM_MODEL }}
        LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      run: |
        python main.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 只追踪生成的简报文件（db 和 logs 已经在 .gitignore 里了）
        git add briefs/*.md
        
        # 检查是否有新文件生成，避免 git commit 报错断掉流程
        if git diff --staged --quiet; then
          echo "No new briefs to commit today."
        else
          git commit -m "docs: auto-generate daily brief $(date +'%Y-%m-%d')"
          git push
        fi
